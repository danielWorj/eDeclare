 <aside class="sidebar">
    <div class="sidebar-section-label">Navigation</div>

     @if (role()==1) {
      <!-- ADMIN -->
     }
     @if (role()==2) {
      <!-- HOPITAL -->
        <a  id="nav-dashboard" class="sidebar-link active" data-section="section-dashboard"
          onclick="showSection('section-dashboard', this); return false;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Tableau de bord
        </a>

        <a  id="nav-naissances" class="sidebar-link" data-section="section-naissances"
          onclick="showSection('section-naissances', this); return false;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Actes de naissance
          <span class="sidebar-badge">17</span>
        </a>

        <a  class="sidebar-link" onclick="showToast('Module Décès — Bientôt disponible', 'info'); return false;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Décès
        </a>

        <a  class="sidebar-link" onclick="showToast('Module Mariages — Bientôt disponible', 'info'); return false;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Mariages
        </a>

        <div class="sidebar-section-label" style="margin-top:.5rem;">Gestion</div>

        <a  class="sidebar-link" onclick="showToast('Module Archives', 'info'); return false;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
          Archives
        </a>
        <a  class="sidebar-link" onclick="showToast('Rapports', 'info'); return false;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Rapports
        </a>

     }
     @if (role()==3) {
      <!-- MAIRIE -->
        <a  id="nav-dashboard" class="sidebar-link" routerLink="dashboard" routerLinkActive="active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Tableau de bord
        </a>

        <a  id="nav-naissances" class="sidebar-link" routerLink="acte-naissance" routerLinkActive="active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Actes de naissance 
          <span class="sidebar-badge">17</span>
        </a>

        <a  class="sidebar-link" routerLink="declaration" routerLinkActive="active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Declaration
        </a>


        <div class="sidebar-section-label" style="margin-top:.5rem;">Gestion</div>

        <a  class="sidebar-link" onclick="showToast('Module Archives', 'info'); return false;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
          Archives
        </a>
        <a  class="sidebar-link" onclick="showToast('Rapports', 'info'); return false;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Rapports
        </a>

     }
     @if (role()==4) {
      <!-- PARENT -->
     }
    <div style="margin-top:auto;padding:1.25rem;">
      <div style="background:var(--primary-xlight);border-radius:var(--radius-sm);padding:.85rem;border:1px solid var(--border);">
        <div style="font-size:11.5px;font-weight:700;color:var(--primary);margin-bottom:.25rem;">Dossiers urgents</div>
        <div style="font-size:22px;font-weight:700;color:var(--accent);font-family:var(--font-display);">3</div>
        <div style="font-size:11px;color:var(--text-muted);">À traiter sous 24h</div>
        <button class="btn-primary-main w-100 mt-2" style="font-size:11.5px;padding:.4rem;" onclick="showSection('section-naissances', document.getElementById('nav-naissances'))">
          Traiter maintenant
        </button>
      </div>
    </div>
  </aside>
